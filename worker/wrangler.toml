name = "ispc-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# account_id is auto-resolved from `wrangler login` if you have only one
# Cloudflare account. If wrangler errors with "more than one account",
# run `pnpm wrangler whoami` and uncomment the line below with your ID.
# account_id = "your-32-char-hex-id"

# These vars are PUBLIC (visible in deployed bundle). Don't put secrets here.
# GITHUB_TOKEN goes in via: pnpm wrangler secret put GITHUB_TOKEN
[vars]
GITHUB_OWNER = "iriszimmerfrau-collab"
GITHUB_REPO = "ispc-inbox"               # private inbox for issues
PUBLISH_REPO = "lgbtresourcesiq"         # site repo where approved stories get committed
PUBLISH_BRANCH = "main"
ALLOWED_ORIGIN = "https://ispc-iq.org"
PLAUSIBLE_SITE_ID = "ispc-iq.org"        # site ID registered in Plausible

# Worker Route on the parent zone. This goes through Cloudflare's
# proxied edge layer, which is where Access policies are evaluated.
# (custom_domain mode bypasses Access in some setups, so we avoid it.)
#
# Requires:
#   1. ispc-iq.org zone is in your Cloudflare account (it is)
#   2. A DNS record for `api.ispc-iq.org` exists in that zone, PROXIED
#      (orange cloud). The record value can be a placeholder — the
#      Worker route intercepts before the origin is contacted.
[[routes]]
pattern = "api.ispc-iq.org/*"
zone_name = "ispc-iq.org"

# RSS feeder runs every 6 hours. Pulls from Google News + HRW, filters
# for LGBTQ+Iraq relevance, and creates `alert-pending` issues in the
# inbox repo for admin review (rather than auto-publishing).
[triggers]
crons = ["0 */6 * * *"]

# Observability (free, no PII): tail logs via `pnpm wrangler tail`
[observability]
enabled = true
