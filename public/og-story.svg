<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #0d1b2e; }
      .cream { fill: #f0e6d3; font-family: 'Libre Baskerville', 'Times New Roman', Georgia, serif; }
      .accent { fill: #d6296b; font-family: 'Libre Baskerville', 'Times New Roman', Georgia, serif; }
      .muted { fill: #c5b89c; font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630"/>
  <g transform="translate(96 96) skewX(-12)">
    <rect fill="#d6296b" x="0" y="0" width="60" height="14"/>
    <rect fill="#7c5cb5" x="72" y="0" width="30" height="14"/>
    <rect fill="#efa838" x="114" y="0" width="14" height="14"/>
  </g>
  <text class="muted" x="96" y="170" font-size="22" font-weight="700" letter-spacing="6">A STORY · COMMUNITY</text>
  <text class="cream" x="96" y="280" font-size="64" font-style="italic">"In my own</text>
  <text class="accent" x="96" y="360" font-size="64" font-style="italic">words."</text>
  <text class="muted" x="96" y="440" font-size="28">Anonymous community contributions from queer Iraqis.</text>
  <text class="muted" x="96" y="560" font-size="24" letter-spacing="2">ispc-iq.org</text>
  <g transform="translate(96 580) skewX(-12)">
