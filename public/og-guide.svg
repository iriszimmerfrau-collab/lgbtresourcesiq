<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #faf7f2; }
      .ink { fill: #0d1b2e; font-family: 'Libre Baskerville', 'Times New Roman', Georgia, serif; }
      .muted { fill: #5a5750; font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; }
      .accent { fill: #7c5cb5; }
      .label { fill: #7c5cb5; font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; letter-spacing: 6px; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630"/>
  <g transform="translate(96 96) skewX(-12)">
    <rect fill="#d6296b" x="0" y="0" width="60" height="14"/>
    <rect class="accent" x="72" y="0" width="30" height="14"/>
    <rect fill="#efa838" x="114" y="0" width="14" height="14"/>
  </g>
  <text class="label" x="96" y="170" font-size="22" font-weight="700">A GUIDE · IRAQ</text>
  <text class="ink" x="96" y="280" font-size="72" font-weight="700">Identity, safety,</text>
  <text class="ink" x="96" y="355" font-size="72" font-weight="700" font-style="italic">community.</text>
  <text class="muted" x="96" y="430" font-size="28">Trustworthy resources for queer Iraqis, in plain language.</text>
  <text class="muted" x="96" y="560" font-size="24" letter-spacing="2">ispc-iq.org</text>
  <g transform="translate(96 580) skewX(-12)">
    <rect fill="#d6296b" x="0" y="0" width="40" height="6"/>
    <rect class="accent" x="48" y="0" width="20" height="6"/>
    <rect fill="#efa838" x="76" y="0" width="10" height="6"/>
  </g>
</svg>
